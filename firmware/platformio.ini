; SPDX-License-Identifier: GPL-3.0-or-later
;
; Chameleon Mesh Node v1 — PlatformIO build environment (stub).
;
; This env layers the board-specific variant (variant.h: BME280@0x76 +
; ESP32-C5 companion-wake) on top of the upstream Seeed Wio-WM1110 board
; definition in meshtastic/firmware. It is NOT standalone — drop this env
; into (or `extra_configs` it from) a meshtastic/firmware checkout.
;
; Bring-up path (see SUBMISSION_CHECKLIST.md):
;   1. git clone https://github.com/meshtastic/firmware
;   2. add variants/chameleon_mesh_node/variant.h  (this repo's firmware/variant.h)
;   3. add this [env:chameleon_mesh_node] block to platformio.ini
;   4. pio run -e chameleon_mesh_node
;
; The base board (Seeed Wio-WM1110 / nRF52840 + LR1110) is already supported
; upstream, so this is an incremental variant, not a new port.

[env:chameleon_mesh_node]
extends = env:wio-tracker-wm1110     ; upstream Wio-WM1110 base env (rename if upstream differs)
board = wio-tracker-wm1110
build_flags =
    ${env:wio-tracker-wm1110.build_flags}
    -DCHAMELEON_MESH_NODE_V1
    -I variants/chameleon_mesh_node
